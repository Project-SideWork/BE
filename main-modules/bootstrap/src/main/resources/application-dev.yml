spring:
  application:
    name: SideWork

  cache:
    type: redis

  datasource:
    url: jdbc:mysql://localhost:3306/growp?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${LOCAL_MYSQL_PASSWORD}

  data:
    redis:
      url: redis://default:${LOCAL_REDIS_PASSWORD}@localhost:6379

  flyway:
    enabled: true
    validate-on-migrate: true
    clean-disabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration


  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}          # GitHub OAuth App Client ID
            client-secret: ${GITHUB_CLIENT_SECRET}  # GitHub OAuth App Client Secret
            scope:
              - read:user
              - user:email
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: login

jwt:
  issuer: project.doctalk@gmail.com
  secret: ${JWT_SECRET}
  access-expiration: 3600
  refresh-expiration: 8640


firebase:
  credentials-base64: ${FIREBASE_CREDENTIALS_BASE64}