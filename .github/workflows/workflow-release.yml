name: CI / CD

on:
  push:
    branches: [ main ]

jobs:
  CI:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: growp
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'adopt'

      - name: Build JAR
        run: |
          find . -type d -name "build" -exec rm -rf {} + || true
          ./gradlew clean bootJar -x test

      - name: Build Docker image
        run: |
          docker build \
          -f main-modules/bootstrap/Dockerfile \
          -t $IMAGE_NAME:$IMAGE_TAG \
          .

      - name: Save Docker image
        run: docker save $IMAGE_NAME:$IMAGE_TAG -o myapp.tar

      - name: Fix permission for tar file
        run: chmod 644 myapp.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
            name: docker-image
            path: myapp.tar

  CD:
    runs-on: ubuntu-latest
    needs: CI

    env:
      IMAGE_NAME: growp
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Verify artifact
        run: ls -lh myapp.tar

      - name: Transfer Docker image to Bastion
        uses: appleboy/scp-action@v0.1.7
        with:
            host: ${{ secrets.NHN_HOST }}
            username: ${{ secrets.NHN_USER }}
            key: ${{ secrets.NHN_SSH_KEY }}
            source: myapp.tar
            target: /home/ubuntu/temp/

      - name: Deploy on App Server via Bastion
        uses: appleboy/ssh-action@v0.1.7
        with:
            host: ${{ secrets.NHN_HOST }}
            username: ${{ secrets.NHN_USER }}
            key: ${{ secrets.NHN_SSH_KEY }}
            script: |
                  set -e
                  cd /home/ubuntu/temp
                  
                  cat << 'EOF' > .env.production
                  SPRING_PROFILES_ACTIVE=prod
                  FIREBASE_CREDENTIALS_BASE64=${{ secrets.FIREBASE_CREDENTIALS_BASE64 }}
                  REDIS_HOST=${{ secrets.REDIS_HOST }}
                  REDIS_USERNAME=${{ secrets.REDIS_USERNAME }}
                  REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
                  REDIS_PORT=${{ secrets.REDIS_PORT }}
                  REMOTE_MYSQL_HOST=${{ secrets.REMOTE_MYSQL_HOST }}
                  REMOTE_MYSQL_PORT=${{ secrets.REMOTE_MYSQL_PORT }}
                  REMOTE_MYSQL_DB=${{ secrets.REMOTE_MYSQL_DB }}
                  REMOTE_MYSQL_USER=${{ secrets.REMOTE_MYSQL_USER }}
                  REMOTE_MYSQL_PASSWORD=${{ secrets.REMOTE_MYSQL_PASSWORD }}
                  JWT_SECRET=${{ secrets.JWT_SECRET }}
                  GIT_CLIENT_ID=${{ secrets.GIT_CLIENT_ID }}
                  GIT_CLIENT_SECRET=${{ secrets.GIT_CLIENT_SECRET }}
                  AES_ENCRYPT_KEY=${{ secrets.AES_ENCRYPT_KEY }}
                  EOF
                  
                  scp myapp.tar .env.production growp:/home/ubuntu/app/
                  
                  ssh growp << 'ENDSSH'
                    set -e
                    cd /home/ubuntu/app
                  
                    docker stop growp 2>/dev/null || true
                    docker rm growp 2>/dev/null || true
                    docker load -i myapp.tar
                  
                    docker run -d \
                      --name growp \
                      -p 8080:8080 \
                      --env-file .env.production \
                      --restart unless-stopped \
                      growp:${{ github.sha }}
                  
                    rm -f myapp.tar
                  ENDSSH

      - name: Cleanup Bastion temp files
        if: always()
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.NHN_HOST }}
          username: ${{ secrets.NHN_USER }}
          key: ${{ secrets.NHN_SSH_KEY }}
          script: |
            rm -f /home/ubuntu/temp/myapp.tar
            rm -f /home/ubuntu/temp/.env.production